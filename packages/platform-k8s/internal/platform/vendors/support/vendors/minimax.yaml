        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Total MiniMax coding plan quota count for one supported model.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.limit
        unit: "{count}"
      - attributes:
