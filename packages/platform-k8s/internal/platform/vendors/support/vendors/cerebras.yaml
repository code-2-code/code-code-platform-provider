---
surfaces:
- surfaceId: openai-compatible
  productInfoId: cerebras
  api:
    apiEndpoints:
    - protocol: PROTOCOL_OPENAI_COMPATIBLE
      baseUrl: https://api.cerebras.ai/v1
  modelCatalogProbeId: cerebras-models
  observability:
    profiles:
    - quotaQuery:
        collectorId: cerebras-quotas
        requiresQuotaCredential: true
        inputForm:
          actionLabel: Update authjs.session-token
          description: Paste the cookie value used by the Cerebras Cloud active quota
            query.
          fields:
          - control: QUOTA_QUERY_INPUT_CONTROL_PASSWORD
            fieldId: authjs_session_token
            label: authjs.session-token
            persistence: QUOTA_QUERY_INPUT_PERSISTENCE_STORED_MATERIAL
            placeholder: Paste authjs.session-token
            required: true
            sensitive: true
          schemaId: cerebras-session
          title: Update authjs.session-token
        minimumPollInterval: 300s
      displayName: Cerebras Quota & Usage
      metricQueries:
      - displayName: Cerebras Quota Usage Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        metricNames:
        - gen_ai.provider.quota.usage.fraction.percent
        queryId: cerebras_quota_usage_fraction_percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
        statement: max by (owner_kind, owner_id, vendor_id, provider_id, model_id,
          window, resource, org_id, org_name, region_id) (gen_ai_provider_quota_usage_fraction_percent)
      - displayName: Cerebras Quota Remaining
        language: METRIC_QUERY_LANGUAGE_PROMQL
        metricNames:
        - gen_ai.provider.quota.remaining
        queryId: cerebras_quota_remaining
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
        statement: max by (owner_kind, owner_id, vendor_id, provider_id, model_id,
          window, resource, org_id, org_name, region_id) (gen_ai_provider_quota_remaining)
      metrics:
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Cerebras model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Cerebras region identifier.
          name: region_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Cerebras quota limit (requests or tokens) for one time window
          and model.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.limit
        unit: '1'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Cerebras model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Cerebras region identifier.
          name: region_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        description: Cerebras current usage (requests or tokens) for one time window
          and model.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.usage
        unit: '1'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Cerebras model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Cerebras region identifier.
          name: region_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Cerebras remaining quota (limit minus usage) for one time window
          and model.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.remaining
        unit: '1'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Cerebras model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Cerebras region identifier.
          name: region_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Cerebras quota usage percentage for one time window and model.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.usage.fraction.percent
        unit: "%"
      profileId: cerebras_quota
  quotaProbeId: cerebras-quotas
