---
surfaces:
- surfaceId: gemini
  productInfoId: google
  api:
    apiEndpoints:
    - protocol: PROTOCOL_GEMINI
      baseUrl: https://generativelanguage.googleapis.com/v1beta
    - protocol: PROTOCOL_OPENAI_COMPATIBLE
      baseUrl: https://generativelanguage.googleapis.com/v1beta/openai
  modelCatalogProbeId: google-models
  observability:
    profiles:
    - quotaQuery:
        collectorId: google-aistudio-quotas
        requiresQuotaCredential: true
        materialReadFields:
        - project_id
        inputForm:
          actionLabel: Update AI Studio Session
          description: Paste the AI Studio browser Cookie request header and quota
            project number.
          fields:
          - control: QUOTA_QUERY_INPUT_CONTROL_TEXTAREA
            description: Copy the Cookie request header from ListModelRateLimits.
            fieldId: cookie
            label: Request Cookie
            persistence: QUOTA_QUERY_INPUT_PERSISTENCE_STORED_MATERIAL
            placeholder: SID=...; HSID=...; SSID=...; SAPISID=...; __Secure-1PAPISID=...
            required: true
            sensitive: true
          - control: QUOTA_QUERY_INPUT_CONTROL_TEXT
            description: Use the projects/<number> value from ListModelRateLimits.
            fieldId: project_id
            label: Project number
            persistence: QUOTA_QUERY_INPUT_PERSISTENCE_STORED_MATERIAL
            placeholder: 112233 or projects/112233
            required: true
          schemaId: google-ai-studio-session
          title: Update AI Studio Session
        minimumPollInterval: 300s
      displayName: Google AI Studio Quota
      metrics:
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Google AI Studio model category key.
          name: model_category
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Provider organization identifier.
          name: org_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Provider organization name.
          name: org_name
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Provider region identifier.
          name: region_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limited resource type (requests, tokens, etc).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Whether the model catalog entry exposes preview aliases.
          name: preview
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Quota dimension key (RPM, TPM, etc).
          name: quota_type
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Google AI Studio quota limit for one model and quota window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.limit
        unit: '1'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Google AI Studio model category key.
          name: model_category
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limited resource type (requests, tokens, etc).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Quota dimension key (RPM, TPM, etc).
          name: quota_type
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Google AI Studio remaining quota value for one model and quota
          window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.remaining
        unit: '1'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Google AI Studio model category key.
          name: model_category
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limited resource type (requests, tokens, etc).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Quota dimension key (RPM, TPM, etc).
          name: quota_type
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Google AI Studio quota reset timestamp per model and quota window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.reset.timestamp.seconds
        unit: '1'
      profileId: aistudio_quota
  quotaProbeId: google-aistudio-quotas
